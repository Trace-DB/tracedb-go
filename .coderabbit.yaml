language: en-US
tone_instructions: "Prioritize first-release Go SDK package shape, generated SDK compatibility, and honest readiness claims."
reviews:
  profile: assertive
  request_changes_workflow: true
  auto_review:
    enabled: true
    base_branches:
      - "main"
    drafts: false
    ignore_title_keywords:
      - "WIP"
      - "DO NOT MERGE"
  path_filters:
    - "!dist/**"
  path_instructions:
    - path: "**/*.go"
      instructions: |
        Check module path, context usage, error surfaces, auth, retries, idempotency, and hosted quickstart compatibility.
    - path: "README.md"
      instructions: |
        Flag claims that imply a published Go SDK before module/tag/proxy receipts exist.
knowledge_base:
  linear:
    usage: "enabled"
    team_keys:
      - "TDB"
chat:
  integrations:
    linear:
      usage: "enabled"
